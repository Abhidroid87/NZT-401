<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bing Rewards Auto Clicker</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <img src="icons/icon-48.png" alt="Extension Icon" class="header-icon">
                <div class="header-text">
                    <h1>Cool More Agent0</h1>
                    <p>Auto Clicker</p>
                </div>
            </div>
        </div>

        <!-- Status Section -->
        <div class="status-section">
            <div class="status-box">
                <span class="status-label">Status:</span>
                <span class="status-badge" id="statusBadge">Inactive</span>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Clicked:</span>
                    <span class="stat-value" id="clickCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Today:</span>
                    <span class="stat-value" id="todayCount">0</span>
                </div>
            </div>
        </div>

        <!-- Control Buttons -->
        <div class="button-group">
            <button class="btn btn-primary" id="startBtn">
                <span class="btn-icon">▶️</span>
                <span>Start</span>
            </button>
            <button class="btn btn-secondary" id="stopBtn">
                <span class="btn-icon">⏹️</span>
                <span>Stop</span>
            </button>
        </div>

        <!-- Settings Section -->
        <div class="settings-section">
            <h3 class="section-title">⚙️ Settings</h3>
            
            <div class="setting-item">
                <label for="autoStart">
                    <input type="checkbox" id="autoStart" class="checkbox">
                    <span>Auto Start on Page Load</span>
                </label>
            </div>

            <div class="setting-item">
                <label for="autoClose">
                    <input type="checkbox" id="autoClose" checked class="checkbox">
                    <span>Auto Close Tab When Done</span>
                </label>
            </div>

            <div class="setting-item">
                <label>Delay Between Clicks (ms):</label>
                <input type="number" id="clickDelay" class="input-field" min="100" max="5000" value="1000">
            </div>

            <div class="setting-item">
                <label>Max Points to Collect:</label>
                <input type="number" id="maxPoints" class="input-field" min="1" max="100" value="999">
            </div>
        </div>

        <!-- Activity Log -->
        <div class="activity-section">
            <h3 class="section-title">📋 Activity Log</h3>
            <div class="activity-log" id="activityLog">
                <p class="empty-state">No activity yet</p>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="btn btn-small btn-info" id="settingsBtn">⚙️ Settings</button>
            <button class="btn btn-small btn-info" id="clearBtn">🗑️ Clear Log</button>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>Version 1.0</p>
            <p>Click the button or visit rewards.bing.com to auto-collect points!</p>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
